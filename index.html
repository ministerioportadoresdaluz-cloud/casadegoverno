<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C.G. 2026 – Portadores da Luz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Raleway', sans-serif; background: #0a0a14; color: #e8e0ff; min-height: 100vh; overflow-x: hidden; }
    .bg-glow { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; }
    .glow1 { width: 400px; height: 400px; background: rgba(90,60,200,0.22); top: -120px; left: -120px; }
    .glow2 { width: 350px; height: 350px; background: rgba(40,90,220,0.18); bottom: -80px; right: -80px; }
    .glow3 { width: 250px; height: 250px; background: rgba(140,60,255,0.13); top: 40%; left: 45%; }
    #login-screen, #app-screen { position: relative; z-index: 1; }
    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
    .logo-area { text-align: center; margin-bottom: 2.5rem; }
    .logo-title-main { font-family: 'Cinzel', serif; font-size: 26px; font-weight: 700; letter-spacing: 6px; color: #c4aaff; text-transform: uppercase; margin-bottom: 6px; }
    .logo-title-sub { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 4px; color: rgba(169,143,255,0.5); text-transform: uppercase; }
    .divider { width: 70px; height: 1px; background: linear-gradient(90deg, transparent, rgba(140,80,255,0.6), transparent); margin: 14px auto 0; }
    .login-card { background: rgba(255,255,255,0.04); border: 0.5px solid rgba(140,80,255,0.3); border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 360px; }
    .login-card h2 { font-family: 'Cinzel', serif; font-size: 17px; font-weight: 600; color: #c4aaff; text-align: center; margin-bottom: 0.4rem; letter-spacing: 2px; }
    .login-card p { font-size: 12px; color: rgba(200,180,255,0.5); text-align: center; margin-bottom: 1.8rem; letter-spacing: 1px; }
    .field-group { margin-bottom: 1.1rem; }
    .field-group label { display: block; font-size: 11px; letter-spacing: 1.5px; color: rgba(200,180,255,0.6); margin-bottom: 7px; text-transform: uppercase; }
    .field-group input { width: 100%; background: rgba(255,255,255,0.05); border: 0.5px solid rgba(140,80,255,0.35); border-radius: 8px; padding: 11px 14px; font-size: 14px; font-family: 'Raleway', sans-serif; color: #e8e0ff; outline: none; transition: border-color 0.2s; }
    .field-group input:focus { border-color: rgba(140,80,255,0.75); }
    .field-group input::placeholder { color: rgba(200,180,255,0.22); }
    .btn-login { width: 100%; margin-top: 1.2rem; padding: 12px; background: linear-gradient(135deg,#5c35c8,#2f5dc8); border: none; border-radius: 8px; font-family: 'Raleway', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 2.5px; color: #fff; cursor: pointer; transition: opacity 0.2s; text-transform: uppercase; }
    .btn-login:hover { opacity: 0.85; }
    .login-error { font-size: 12px; color: #ff4477; text-align: center; margin-top: 0.8rem; min-height: 18px; }
    #app-screen { display: none; min-height: 100vh; flex-direction: column; }
    #app-screen.active { display: flex; }
    .app-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; border-bottom: 0.5px solid rgba(140,80,255,0.2); background: rgba(0,0,0,0.35); }
    .app-header-title { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 2px; color: #a98fff; font-weight: 600; }
    .app-header-sub { font-size: 10px; letter-spacing: 2px; color: rgba(169,143,255,0.42); font-family: 'Cinzel', serif; margin-top: 2px; }
    .user-badge { display: flex; align-items: center; gap: 8px; font-size: 12px; color: rgba(200,180,255,0.7); }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg,#5c35c8,#2f5dc8); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; flex-shrink: 0; }
    .user-name { max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-logout { background: transparent; border: 0.5px solid rgba(140,80,255,0.3); border-radius: 6px; padding: 5px 12px; font-size: 11px; color: rgba(200,180,255,0.5); cursor: pointer; font-family: 'Raleway', sans-serif; letter-spacing: 1px; transition: all 0.2s; }
    .btn-logout:hover { border-color: rgba(140,80,255,0.6); color: #c4aaff; }
    .app-body { display: flex; flex: 1; flex-direction: column; }
    @media (min-width: 700px) { .app-body { flex-direction: row; } }
    .video-area { flex: 1; padding: 1.5rem; }
    .video-wrap { position: relative; width: 100%; padding-top: 56.25%; background: #000; border-radius: 12px; overflow: hidden; border: 0.5px solid rgba(140,80,255,0.25); }
    .video-wrap iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:none; }
    .video-info { margin-top: 1.1rem; }
    .video-num { font-size: 11px; letter-spacing: 2px; color: rgba(169,143,255,0.55); text-transform: uppercase; margin-bottom: 5px; }
    .video-title { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 600; color: #d4c0ff; }
    .progress-bar { height: 2px; background: rgba(140,80,255,0.15); border-radius: 1px; margin-top: 10px; }
    .progress-fill { height: 2px; background: linear-gradient(90deg,#5c35c8,#2f5dc8); border-radius: 1px; transition: width 0.4s; }
    .nav-btns { display: flex; gap: 10px; margin-top: 1.1rem; }
    .nav-btn { flex: 1; padding: 9px; background: rgba(90,50,200,0.12); border: 0.5px solid rgba(140,80,255,0.28); border-radius: 8px; font-family: 'Raleway', sans-serif; font-size: 12px; color: #a98fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.15s; }
    .nav-btn:hover { background: rgba(90,50,200,0.28); }
    .nav-btn:disabled { opacity: 0.28; cursor: default; }
    .playlist-panel { width: 100%; border-top: 0.5px solid rgba(140,80,255,0.15); background: rgba(0,0,0,0.22); padding: 1rem; overflow-y: auto; }
    @media (min-width: 700px) { .playlist-panel { width: 280px; border-top: none; border-left: 0.5px solid rgba(140,80,255,0.15); max-height: calc(100vh - 64px); } }
    .playlist-header { font-size: 11px; letter-spacing: 2px; color: rgba(169,143,255,0.5); text-transform: uppercase; margin-bottom: 0.75rem; padding-bottom: 0.6rem; border-bottom: 0.5px solid rgba(140,80,255,0.14); display: flex; align-items: center; gap: 6px; }
    .playlist-item { display: flex; align-items: center; gap: 10px; padding: 10px 8px; border-radius: 8px; cursor: pointer; transition: background 0.15s; margin-bottom: 3px; }
    .playlist-item:hover { background: rgba(140,80,255,0.1); }
    .playlist-item.active { background: rgba(90,50,200,0.25); border: 0.5px solid rgba(140,80,255,0.3); }
    .item-num { width: 20px; font-size: 11px; color: rgba(169,143,255,0.38); text-align: center; flex-shrink: 0; }
    .item-play { width: 30px; height: 30px; border-radius: 50%; background: rgba(90,50,200,0.28); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .item-play i { font-size: 13px; color: #a98fff; }
    .playlist-item.active .item-play { background: rgba(90,50,200,0.7); }
    .playlist-item.active .item-play i { color: #fff; }
    .item-text { flex: 1; min-width: 0; }
    .item-title { font-size: 12.5px; font-weight: 500; color: rgba(220,200,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; }
    .item-sub { font-size: 10px; color: rgba(169,143,255,0.38); margin-top: 2px; }
    .playlist-item.active .item-title { color: #d4c0ff; }
  </style>
</head>
<body>
  <div class="bg-glow glow1"></div>
  <div class="bg-glow glow2"></div>
  <div class="bg-glow glow3"></div>

  <div id="login-screen">
    <div class="logo-area">
      <div class="logo-title-main">Portadores da Luz</div>
      <div class="logo-title-sub">Ministério</div>
      <div class="divider"></div>
    </div>
    <div class="login-card">
      <h2>C.G. de 2026</h2>
      <p>Casa de Governo · Acesso às Aulas</p>
      <div class="field-group">
        <label>Seu nome</label>
        <input type="text" id="input-nome" placeholder="Digite seu nome completo" autocomplete="off" />
      </div>
      <div class="field-group">
        <label>Senha de acesso</label>
        <input type="password" id="input-senha" placeholder="••••••••" autocomplete="off" />
      </div>
      <button class="btn-login" onclick="doLogin()">Entrar</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <div id="app-screen">
    <div class="app-header">
      <div>
        <div class="app-header-title">Portadores da Luz</div>
        <div class="app-header-sub">CG 2026 · Casa de Governo</div>
      </div>
      <div class="user-badge">
        <div class="user-avatar" id="user-avatar">?</div>
        <span class="user-name" id="user-nome-display"></span>
        <button class="btn-logout" onclick="doLogout()">Sair</button>
      </div>
    </div>
    <div class="app-body">
      <div class="video-area">
        <div class="video-wrap">
          <iframe id="yt-frame" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <div class="video-info">
          <div class="video-num" id="aula-num">Aula 1 de 9</div>
          <div class="video-title" id="aula-titulo">–</div>
          <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:11%"></div></div>
        </div>
        <div class="nav-btns">
          <button class="nav-btn" id="btn-prev" onclick="navAula(-1)"><i class="ti ti-player-skip-back"></i> Anterior</button>
          <button class="nav-btn" id="btn-next" onclick="navAula(1)">Próxima <i class="ti ti-player-skip-forward"></i></button>
        </div>
      </div>
      <div class="playlist-panel">
        <div class="playlist-header"><i class="ti ti-playlist"></i> Playlist · 9 aulas</div>
        <div id="playlist-list"></div>
      </div>
    </div>
  </div>

  <script>
    const SENHA = 'cg2026';
    const aulas = [
      { titulo: '16.01.26 - Crenças e Riquezas | Pra. Mary', vid: 'kaGv5rYKIy4' },
      { titulo: '20.02.26 - Santificação integral (espírito, alma e corpo) - Alma - Pra. Mary Martins Werle', vid: 'zlW9QVqIapI' },
      { titulo: '06.03.2026 - Profeta Marcelo Werle', vid: '_8ON-j_3si0' },
      { titulo: '13.03.26 - A natureza multidimensional e o poder latente da alma e do ser integral - Pra. Mary', vid: '3bUp_d8c5RE' },
      { titulo: '10.04.26 - Diferenciando emoções e sentimentos - Pra. Mary', vid: 'HxDYjrW1StI' },
      { titulo: '17.04.26 - Pra. Mary', vid: 'jd1D4jcoptU' },
      { titulo: '24.04.26 - Estudo sobre emoções - Pra. Mary', vid: 'h5aHDFfywWI' },
      { titulo: '01.05.26 - Estudo sobre emoções - Pra. Mary M. Werle', vid: 'Pjvu-fRy8VU' },
      { titulo: '08.05.26 - O poder latente da alma | Parte 1 - Pra. Mary', vid: 'Jver7B76kPg' },
    ];
    let aulaAtual = 0;

    function doLogin() {
      const nome = document.getElementById('input-nome').value.trim();
      const senha = document.getElementById('input-senha').value;
      const erro = document.getElementById('login-error');
      if (!nome) { erro.textContent = 'Por favor, informe seu nome.'; return; }
      if (senha !== SENHA) { erro.textContent = 'Senha incorreta. Tente novamente.'; return; }
      erro.textContent = '';
      const primeiroNome = nome.split(' ')[0];
      document.getElementById('user-nome-display').textContent = primeiroNome;
      document.getElementById('user-avatar').textContent = nome.charAt(0).toUpperCase();
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-screen').classList.add('active');
      buildPlaylist();
      loadAula(0);
    }

    function doLogout() {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app-screen').classList.remove('active');
      document.getElementById('input-nome').value = '';
      document.getElementById('input-senha').value = '';
      document.getElementById('yt-frame').src = '';
    }

    function buildPlaylist() {
      const list = document.getElementById('playlist-list');
      list.innerHTML = '';
      aulas.forEach((a, i) => {
        const div = document.createElement('div');
        div.className = 'playlist-item' + (i === 0 ? ' active' : '');
        div.id = 'item-' + i;
        div.innerHTML = `
          <div class="item-num">${i + 1}</div>
          <div class="item-play"><i class="ti ti-player-play"></i></div>
          <div class="item-text">
            <div class="item-title">${a.titulo}</div>
            <div class="item-sub">C.G. 2026</div>
          </div>`;
        div.onclick = () => loadAula(i);
        list.appendChild(div);
      });
    }

    function loadAula(idx) {
      aulaAtual = idx;
      const a = aulas[idx];
      document.getElementById('aula-titulo').textContent = a.titulo;
      document.getElementById('aula-num').textContent = `Aula ${idx + 1} de ${aulas.length}`;
      document.getElementById('prog-fill').style.width = Math.round(((idx + 1) / aulas.length) * 100) + '%';
      document.getElementById('yt-frame').src = `https://www.youtube.com/embed/${a.vid}?autoplay=1&rel=0`;
      document.querySelectorAll('.playlist-item').forEach(el => el.classList.remove('active'));
      const item = document.getElementById('item-' + idx);
      if (item) { item.classList.add('active'); item.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
      document.getElementById('btn-prev').disabled = idx === 0;
      document.getElementById('btn-next').disabled = idx === aulas.length - 1;
    }

    function navAula(dir) {
      const novo = aulaAtual + dir;
      if (novo >= 0 && novo < aulas.length) loadAula(novo);
    }

    document.getElementById('input-senha').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
